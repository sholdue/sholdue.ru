<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>sholdue</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: black;
      background-image: url("b.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: "Space Mono", monospace;
      color: #f0ece4;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 0;
    }

    .top {
      position: relative;
      z-index: 1;
      padding: 52px 48px 120px;
      max-width: 720px;
    }

    .site-title {
      font-family: "Unbounded", sans-serif;
      font-weight: 700;
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f0ece4;
      line-height: 1;
      margin-bottom: 40px;
      text-shadow: 0 0 24px rgba(240, 236, 228, 0.25);
    }

    .section-label {
      font-family: "Unbounded", sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(240, 236, 228, 0.45);
      margin-bottom: 12px;
      margin-top: 36px;
    }

    .section-label:first-of-type {
      margin-top: 0;
    }

    .item {
      margin: 6px 0;
      font-size: 13px;
      line-height: 1.6;
    }

    a {
      color: #f0ece4;
      text-decoration: none;
      display: inline-flex;
      align-items: baseline;
      gap: 7px;
      flex-wrap: wrap;
      transition: opacity 0.2s;
    }

    .social-wrapper {
      position: relative;
      display: inline-block;
    }

    .tooltip.copied {
      background: rgba(77, 255, 136, 0.15);
      border-color: rgba(77, 255, 136, 0.3);
      color: #6dffa0;
    }

    .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid rgba(240, 236, 228, 0.15);
      color: #f0ece4;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .tooltip::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(240, 236, 228, 0.15);
    }

    .social-wrapper:hover .tooltip,
    .social-wrapper:focus-within .tooltip {
      opacity: 1;
    }

    a:hover {
      opacity: 0.55;
    }

    .no-link {
      display: inline-flex;
      align-items: baseline;
      gap: 7px;
      flex-wrap: wrap;
      color: rgba(240, 236, 228, 0.5);
      font-size: 13px;
    }

    .tag {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 2px 6px;
      border-radius: 2px;
      flex-shrink: 0;
      line-height: 1.6;
    }

    .tag-game {
      background: rgba(77, 166, 255, 0.18);
      color: #7ac4ff;
      border: 1px solid rgba(77, 166, 255, 0.35);
    }

    .tag-guide {
      background: rgba(77, 255, 136, 0.15);
      color: #6dffa0;
      border: 1px solid rgba(77, 255, 136, 0.3);
    }

    .tag-tba {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(240, 236, 228, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tag-official {
      background: rgba(255, 210, 77, 0.15);
      color: #ffd97a;
      border: 1px solid rgba(255, 210, 77, 0.3);
    }

    .tag-fan {
      background: rgba(255, 122, 122, 0.15);
      color: #ff9e9e;
      border: 1px solid rgba(255, 122, 122, 0.3);
    }

    .tag-plain {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(240, 236, 228, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .item-name {
      color: #f0ece4;
    }

    .no-link .item-name {
      color: rgba(240, 236, 228, 0.5);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(240, 236, 228, 0.2);
      margin: 32px 0;
    }

    .info {
      pointer-events: auto;
      z-index: 10;
      position: fixed;
      bottom: 24px;
      left: 48px;
      font-size: 12px;
      z-index: 1;
      letter-spacing: 0.04em;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .info a {
      color: rgba(240, 236, 228, 0.5);
      text-decoration: none;
      display: inline;
      transition: color 0.2s, opacity 0.2s;
    }

    .info a:hover {
      color: #f0ece4;
      opacity: 1;
    }

    .socials {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .socials .sep {
      color: rgba(240, 236, 228, 0.2);
      font-size: 10px;
      pointer-events: none;
    }

    .email {
      color: rgba(240, 236, 228, 0.35) !important;
      font-size: 11px;
    }
  </style>
</head>

<body>

    </div>
